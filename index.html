<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>! 𝑺𝑬𝑵𝑺𝑬𝑫 • Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { width: 100%; height: 100%; background-color: #0d0d0d; color: #cfcfcf; overflow: hidden; }
        
        /* Экран загрузки */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: opacity 1.3s ease; }
        
        /* Надпись Welcome */
        #loading-text { font-size: 1.8rem; opacity: 0; animation: fadeInText 2s forwards; color: #fff; letter-spacing: 7px; text-align: center; padding: 0 10px; }
        
        /* Кнопка входа */
        #enter-btn { margin-top: 30px; font-size: 0.9rem; cursor: pointer; color: #777; border: 1px solid #333; padding: 12px 24px; background: none; display: none; opacity: 0; transform: translateY(20px); transition: opacity 1.5s ease, transform 1.5s ease, color 0.4s, border-color 0.4s, background 0.4s; }
        #enter-btn:hover { color: #fff; border-color: #fff; background: #151515; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        #enter-btn.show { display: block; opacity: 1; transform: translateY(0); }

        /* Главный контент */
        #main-content { opacity: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; transition: opacity 1.5s ease; }
        
        /* Широкое окно */
        .profile-card { max-width: 550px; width: 100%; text-align: center; border: 1px solid #222; padding: 35px 25px; background: #121212; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Исправленный заголовок с вечной CSS-анимацией */
        h1 { font-size: 2.2rem; height: 2.6rem; margin-bottom: 10px; color: #fff; letter-spacing: 2px; text-align: center; font-weight: normal; display: flex; justify-content: center; align-items: center; }
        h1::after { content: "!"; animation: typeTitle 10s infinite; }
        
        .info-line { color: #666; font-size: 0.85rem; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
        .info-line-last { margin-bottom: 25px; }
        
        .section { margin-top: 30px; text-align: left; }
        .section h2 { font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 6px; margin-bottom: 12px; color: #999; letter-spacing: 1px; font-weight: normal; }
        
        ul { list-style: none; }
        ul li { margin: 7px 0; color: #8a8a8a; font-size: 0.95rem; }
        .small-list-item { font-size: 0.85rem; color: #666; margin-top: 9px; }
        .extra-small-text { font-size: 0.75rem; color: #555; margin-top: 5px; }
        
        /* Музыкальные кнопки */
        .music-item { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
        .play-btn { background: none; border: 1px solid #333; color: #666; font-size: 0.75rem; padding: 3px 8px; cursor: pointer; border-radius: 3px; font-family: monospace; transition: 0.2s; }
        .play-btn:hover { color: #fff; border-color: #666; }
        .play-btn.playing { color: #fff; border-color: #fff; background: #222; }

        .sub-block { margin-bottom: 20px; }
        .sub-block:last-child { margin-bottom: 0; }
        .sub-title { font-size: 0.95rem; color: #aaa; margin-bottom: 4px; }
        .sub-desc { font-size: 0.85rem; color: #666; line-height: 1.4; }

        /* Галерея */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .gallery img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; filter: grayscale(50%); transition: 0.4s ease; border: 1px solid #222; }
        .gallery img:hover { filter: grayscale(0%); transform: translateY(-2px); border-color: #555; }

        @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }

        /* Идеальная покадровая анимация: пишет, ждет 5 секунд, стирает, ждет */
        @keyframes typeTitle {
            0%   { content: "!"; }
            3%   { content: "! 𝑱"; }
            6%   { content: "! 𝑺"; }
            9%   { content: "! 𝑺𝑬"; }
            12%  { content: "! 𝑺𝑬𝑵"; }
            15%  { content: "! 𝑺𝑬𝑵𝑺"; }
            18%  { content: "! 𝑺𝑬𝑵𝑺𝑬"; }
            21%  { content: "! 𝑺𝑬𝑵𝑺𝑬𝑫"; }
            71%  { content: "! 𝑺𝑬𝑵𝑺𝑬𝑫"; } /* Держит текст ровно 5 секунд (50% от всей анимации) */
            74%  { content: "! 𝑺𝑬𝑵𝑺𝑬"; }
            77%  { content: "! 𝑺𝑬𝑵𝑺"; }
            80%  { content: "! 𝑺𝑬𝑵"; }
            83%  { content: "! 𝑺𝑬"; }
            86%  { content: "! 𝑱"; }
            89%  { content: "! 𝑱"; }
            92%  { content: "!"; }
            100% { content: "!"; }
        }
    </style>
</head>
<body>
