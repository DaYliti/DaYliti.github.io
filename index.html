<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ворсинка • Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body, html { width: 100%; height: 100%; background-color: #0d0d0d; color: #cfcfcf; overflow: hidden; }
        
        /* Экран загрузки */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: opacity 1.3s ease; }
        #loading-text { font-size: 1.8rem; opacity: 0; animation: fadeIn 2.5s forwards; color: #fff; letter-spacing: 7px; text-transform: uppercase; text-align: center; padding: 0 10px; }
        #enter-btn { margin-top: 30px; font-size: 0.9rem; opacity: 0; cursor: pointer; color: #777; border: 1px solid #333; padding: 12px 24px; background: none; transition: 0.4s; display: none; text-transform: lowercase; }
        #enter-btn:hover { color: #fff; border-color: #fff; background: #151515; box-shadow: 0 0 10px rgba(255,255,255,0.1); }

        /* Главный контент */
        #main-content { opacity: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; transition: opacity 1.5s ease; }
        .profile-card { max-width: 450px; width: 100%; text-align: center; border: 1px solid #222; padding: 35px 25px; background: #121212; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #fff; letter-spacing: 2px; }
        .age { color: #666; margin-bottom: 25px; font-size: 0.85rem; letter-spacing: 1px; }
        .section { margin-top: 30px; text-align: left; }
        .section h2 { font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 6px; margin-bottom: 12px; color: #999; letter-spacing: 1px; }
        ul { list-style: none; }
        ul li { margin: 7px 0; color: #8a8a8a; font-size: 0.9rem; }
        
        /* Блок кота */
        .cat-block { background: #161616; padding: 15px; margin-top: 10px; border-left: 2px solid #a3a3a3; border-radius: 4px; text-align: left; font-size: 0.9rem; line-height: 1.4; color: #999; }
        .cat-block strong { color: #fff; }
        
        /* Галерея */
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .gallery img { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; filter: grayscale(50%); transition: 0.4s ease; border: 1px solid #222; }
        .gallery img:hover { filter: grayscale(0%); transform: translateY(-2px); border-color: #555; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Фоновое аудио -->
    <audio id="bg-music" loop prefetch="auto">
        <source src="https://audio.com/ded-9/audio/startafight-valence-and-brae" type="audio/wav">
        <source src="https://soundhelix.com" type="audio/mp3">
    </audio>

    <!-- Загрузка -->
    <div id="loader">
        <div id="loading-text">Ворсинка</div>
        <button id="enter-btn" onclick="startSite()">нажмите, чтобы продолжить</button>
    </div>

    <!-- Главная страница -->
    <div id="main-content">
        <div class="profile-card">
            <h1>ВОРСИНКА</h1>
            <div class="age">Возраст: 16-17 лет</div>

            <div class="section">
                <h2>🎬 Мои Фандомы</h2>
                <ul>
                    <li>✦ Anime / Manga</li>
                    <li>✦ Gaming</li>
                    <li>✦ Music Culture</li>
                </ul>
            </div>

            <div class="section">
                <h2>🐾 Главный в доме</h2>
                <div class="cat-block">
                    <strong>Сёма</strong> — мой самый любимый на свете кот. Настоящий хозяин этой страницы и главный ценитель тишины.
                </div>
            </div>

            <div class="section">
                <h2>📸 Эстетика</h2>
                <div class="gallery">
                    <!-- Минималистичные котики и аниме вайб -->
                    <img src="https://unsplash.com" alt="Cat 1">
                    <img src="https://unsplash.com" alt="Cat 2">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Появление кнопки "продолжить"
        setTimeout(() => {
            const btn = document.getElementById('enter-btn');
            btn.style.display = 'block';
            setTimeout(() => btn.style.opacity = '1', 50);
        }, 2200);

        function startSite() {
            const music = document.getElementById('bg-music');
            
            // Выставляем тихую громкость (0.2 — это примерно 20% от максимума)
            music.volume = 0.2; 
            
            // Запуск воспроизведения
            music.play().catch(e => console.log("Музыка ожидает разрешения браузера"));

            // Анимация ухода экрана загрузки
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.opacity = '1';
            }, 1300);
        }
    </script>
</body>
</html>
